<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    /* 字体与群课表一致 */
    @font-face {
      font-family: 'ScheduleFont';
      src: url('{{_fontInlineUrl}}') format('{{_fontFormat}}');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'ScheduleFont', 'Unifont', 'Microsoft YaHei', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 1080px;
      max-width: 1080px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      background: white;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: relative;
    }

    /* 标题区 */
    .header {
      padding: 40px 30px 20px;
      text-align: center;
      background: #FFFFFF;
    }

    .header h1 {
      font-size: 48px;
      color: #333;
      display: inline-block;
      background: rgba(0, 137, 123, 0.35);
      padding: 10px 40px;
      border-radius: 60px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .header .subtitle {
      font-size: 20px;
      color: #666;
      margin-top: 10px;
    }

    .header .subtitle span {
      background: #00897B;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
    }

    /* 分组 */
    .group-box {
      padding: 20px 30px;
    }

    .group-title {
      font-size: 28px;
      color: #2d3748;
      margin: 20px 0 10px;
      padding-left: 15px;
      border-left: 6px solid #00897B;
    }

    .help-table {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }

    .help-item {
      flex: 1 1 calc(33.33% - 10px);
      min-width: 250px;
      background: #f8fafc;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #edf2f7;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }

    .help-item:hover {
      box-shadow: 0 5px 15px rgba(0, 137, 123, 0.1);
      transform: translateY(-2px);
    }

    .help-icon {
      width: 50px;
      height: 50px;
      background: #00897B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      color: white;
      font-size: 24px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .help-content {
      flex: 1;
    }

    .help-title {
      font-size: 22px;
      color: #1a202c;
      margin-bottom: 5px;
      display: block;
    }

    .help-desc {
      font-size: 16px;
      color: #718096;
    }

    /* 底部 */
    .footer {
      padding: 30px;
      background: #f8fafc;
      border-top: 1px solid #e9edf2;
      text-align: center;
      position: relative;
    }

    .footer::after {
      content: "";
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: #00897B;
      opacity: 0.3;
      clip-path: polygon(0 0, 0% 100%, 100% 100%);
    }

    .update-time {
      font-size: 18px;
      color: #718096;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>{{title}}</h1>
      <div class="subtitle">
        <span>{{subTitle}}</span>
      </div>
    </div>

    <div class="group-box">
      {{each groups group}}
      <div class="group-title">{{group.group}}</div>
      <div class="help-table">
        {{each group.list item}}
        <div class="help-item">
          <div class="help-icon">{{item.icon}}</div>
          <div class="help-content">
            <span class="help-title">{{item.title}}</span>
            <span class="help-desc">{{item.desc}}</span>
          </div>
        </div>
        {{/each}}
      </div>
      {{/each}}
    </div>

    <div class="footer">
      <div class="update-time">Generated By @Temmie Schedule-Plugin · 输入 #课表帮助 查看更多</div>
    </div>
  </div>
</body>

</html>
