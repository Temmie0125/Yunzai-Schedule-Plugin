pushHour: 20
showTableName: true
autoRecallCode: false
renderScale: 1.0
renderRestartCount: 100
maxRenderRetry: 1
renderTimeOut: 10000
autoCancelCheckEnabled: false    
autoCancelCheckInterval: 60
birthdayPushHour: 0
allowSelfModify: true
birthdayWhitelistGroups: []
birthdayBlacklistGroups: []
# WakeUp 课程表服务基础URL
# 默认使用公共服务，也可以配置自己的服务地址
wakeupServiceUrl: "https://wakeup.cpc.cn.eu.org/"
# WakeUp API端点路径
wakeupApiEndpoint: "/parse"
# WakeUp 服务鉴权方式: Bearer / X-Auth-Token / None
wakeupAuthType: "None"
# WakeUp 服务鉴权 Token，留空则不进行鉴权
wakeupAuthToken: ""
# 默认学期开始日期
defaultSemesterStart: "2026-03-02"
# 自定义bot名称
botName: ""
# 字体风格
font: "像素"
# 群课表排序方式 userId：按QQ号；courseStatus：按上课状态
sortMode: "userId"
# 生日列表是否展示QQ号
showQQ: true
# 监听所有文件以尝试自动导入课表
watchFiles: false
# 生日列表允许使用自定义昵称，关闭则同步QQ昵称
birthdayCustomName: true